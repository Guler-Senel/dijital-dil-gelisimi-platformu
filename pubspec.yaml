name: kidlingua
description: KidLingua - Türkçe dil öğrenme uygulaması (3-6 yaş).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  provider: ^6.1.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
